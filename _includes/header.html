<header class="site-header" role="banner">
  <div class="header-inner">

    <!-- Mobile toggle -->
    <input id="nav-open" type="checkbox" class="vh" />

    <!-- Hamburger -->
    <label for="nav-open"
           class="hamburger"
           aria-label="Abrir menú"
           aria-controls="main-menu">
      <span></span>
      <span></span>
      <span></span>
    </label>

    <!-- Logo -->
    <a href="{{ '/' | relative_url }}" class="header-brand" aria-label="Inicio">
      <img src="{{ '/images/summer_logo.svg' | relative_url }}"
           alt="English Co – Academia de Inglés"
           class="header-logo" />
    </a>

    <!-- Contact -->
    <div class="header-actions">
      <a class="phone icon-btn call" href="tel:+34646555552" aria-label="Llamar">
        <img src="{{ '/images/phone.svg' | relative_url }}" alt="" width="22" height="22">
      </a>

      <a class="phone-number desktop-only phone-text" href="tel:+34646555552">
        646 555 552
      </a>

      <a class="whatsapp icon-btn whatsapp"
         href="https://wa.me/34646555552"
         target="_blank"
         rel="noopener"
         aria-label="WhatsApp">
        <img src="{{ '/images/whatsapp.svg' | relative_url }}" alt="" width="22" height="22">
      </a>
    </div>

    {% assign path = page.url | downcase %}

    <!-- Nav -->
    <nav class="navbar" role="navigation" aria-label="Principal">
      <ul class="menu" id="main-menu">

        <li>
          <a href="{{ '/' | relative_url }}"
             class="{% if page.section == 'home' or path == '/' %}active{% endif %}"
             {% if page.section == 'home' or path == '/' %}aria-current="page"{% endif %}>
            Inicio
          </a>
        </li>

        <li class="dropdown">
          <!-- Keep submenu open on mobile when on a course page -->
          <input type="checkbox"
                 id="toggle-cursos"
                 class="vh"
                 {% if page.section == 'cursos'
                    or path contains '/infantil'
                    or path contains '/primaria'
                    or path contains '/secundaria'
                    or path contains '/adultos' %}checked{% endif %} />

          <label for="toggle-cursos"
                 class="no-link {% if page.section == 'cursos'
                                   or path contains '/infantil'
                                   or path contains '/primaria'
                                   or path contains '/secundaria'
                                   or path contains '/adultos' %}active{% endif %}">
            Cursos
          </label>

          <ul class="submenu">
            <li>
              <a href="{{ '/infantil' | relative_url }}"
                 class="{% if path contains '/infantil' %}active{% endif %}"
                 {% if path contains '/infantil' %}aria-current="page"{% endif %}>
                Infantil
              </a>
            </li>

            <li>
              <a href="{{ '/primaria' | relative_url }}"
                 class="{% if path contains '/primaria' %}active{% endif %}"
                 {% if path contains '/primaria' %}aria-current="page"{% endif %}>
                Primaria
              </a>
            </li>

            <li>
              <a href="{{ '/secundaria' | relative_url }}"
                 class="{% if path contains '/secundaria' %}active{% endif %}"
                 {% if path contains '/secundaria' %}aria-current="page"{% endif %}>
                Secundaria
              </a>
            </li>

            <li>
              <a href="{{ '/adultos' | relative_url }}"
                 class="{% if path contains '/adultos' %}active{% endif %}"
                 {% if path contains '/adultos' %}aria-current="page"{% endif %}>
                Adultos
              </a>
            </li>
          </ul>
        </li>

        <li>
          <a href="{{ '/academia' | relative_url }}"
             class="{% if page.section == 'academia' or path contains '/academia' %}active{% endif %}"
             {% if page.section == 'academia' or path contains '/academia' %}aria-current="page"{% endif %}>
            Academia
          </a>
        </li>

      </ul>
    </nav>

  </div>
</header>
